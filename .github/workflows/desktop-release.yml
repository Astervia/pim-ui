name: desktop-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            runner: macos-15
            args: --target aarch64-apple-darwin
          - label: macos-x86_64
            runner: macos-15-intel
            args: --target x86_64-apple-darwin
          - label: linux
            runner: ubuntu-22.04
            args: ""
          - label: windows
            runner: windows-latest
            args: ""

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.runner, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.label }}

      - name: install ubuntu deps
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install --frozen-lockfile

      # Fetch the real pim-daemon binary from the proximity-internet-mesh
      # release matching `PIM_DAEMON_VERSION`. The release upload is
      # produced by proximity-internet-mesh's own release.yml workflow
      # on tag pushes — keep that repo's tag in sync with this one for
      # reproducible bundles.
      - name: fetch pim-daemon binary
        shell: bash
        run: bash scripts/fetch-daemon.sh

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri auto-updater signing — see https://v2.tauri.app/plugin/updater/
          # Generate keys: `pnpm tauri signer generate -w ~/.tauri/pim.key`
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization — uncomment + configure secrets before prod release:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "pim ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
