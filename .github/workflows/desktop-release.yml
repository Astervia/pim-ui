name: desktop-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            runner: macos-15
            args: --target aarch64-apple-darwin
          - label: macos-x86_64
            runner: macos-15-intel
            args: --target x86_64-apple-darwin
          - label: linux
            runner: ubuntu-22.04
            args: ""
          - label: windows
            runner: windows-latest
            args: ""

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.runner, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.label }}

      - name: install ubuntu deps
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install --frozen-lockfile

      # TODO: fetch real pim-daemon binaries before `tauri build` so
      # they're bundled. Until scripts/fetch-daemon.sh is implemented,
      # we ship the dev stub so the bundle stage doesn't fail.
      - name: build pim-daemon-stub + place at externalBin paths
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path pim-daemon-stub/Cargo.toml
          mkdir -p src-tauri/binaries

          case "${{ matrix.runner }}" in
            ubuntu-*)        triples=(x86_64-unknown-linux-gnu); ext="" ;;
            macos-15)        triples=(aarch64-apple-darwin);     ext="" ;;
            macos-15-intel)  triples=(x86_64-apple-darwin);      ext="" ;;
            windows-*)       triples=(x86_64-pc-windows-msvc);   ext=".exe" ;;
          esac

          for triple in "${triples[@]}"; do
            cp "pim-daemon-stub/target/release/pim-daemon-stub${ext}" \
               "src-tauri/binaries/pim-daemon-${triple}${ext}"
            chmod 755 "src-tauri/binaries/pim-daemon-${triple}${ext}" || true
          done

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri auto-updater signing — see https://v2.tauri.app/plugin/updater/
          # Generate keys: `pnpm tauri signer generate -w ~/.tauri/pim.key`
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization — uncomment + configure secrets before prod release:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "pim ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
