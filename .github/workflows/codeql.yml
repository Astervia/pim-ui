name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC. Catches advisories that landed during the week
    # without a PR triggering the analyser.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql ${{ matrix.language }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            runner: ubuntu-22.04
          - language: rust
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: install ubuntu deps for tauri build
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: initialize codeql
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      # tauri.conf.json's bundle.externalBin requires the sidecar to
      # exist on disk before `cargo build` resolves. Fetch the matching
      # proximity-internet-mesh release before autobuild.
      - name: fetch pim-daemon sidecar
        if: matrix.language == 'rust'
        run: bash scripts/fetch-daemon.sh

      - name: autobuild rust
        if: matrix.language == 'rust'
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked

      # JS/TS analyses statically, no build step needed.

      - name: perform codeql analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
