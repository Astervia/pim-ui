name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  rust-quality:
    name: rust quality (fmt + clippy + audit)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            pim-daemon-stub -> target

      - name: install system deps (webkit2gtk for tauri build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo fmt --check (src-tauri)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo fmt --check (pim-daemon-stub)
        run: cargo fmt --manifest-path pim-daemon-stub/Cargo.toml --all -- --check

      - name: cargo clippy (src-tauri)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: cargo clippy (pim-daemon-stub)
        run: cargo clippy --manifest-path pim-daemon-stub/Cargo.toml --all-targets --locked -- -D warnings

      - name: cargo test (src-tauri)
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: cargo test (pim-daemon-stub)
        run: cargo test --manifest-path pim-daemon-stub/Cargo.toml --locked

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (src-tauri)
        run: cargo audit --file src-tauri/Cargo.lock

      - name: cargo audit (pim-daemon-stub)
        run: cargo audit --file pim-daemon-stub/Cargo.lock

  tauri-cross-build:
    name: tauri build (${{ matrix.label }})
    needs: [frontend, rust-quality]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-22.04
            runner: ubuntu-22.04
          - label: macos-aarch64
            runner: macos-15
          - label: macos-x86_64
            runner: macos-15-intel
          - label: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            pim-daemon-stub -> target
          key: ${{ matrix.label }}

      - name: install ubuntu deps
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install --frozen-lockfile

      # Build the stub daemon and place it at the externalBin path so
      # `cargo build` of src-tauri sees the file the bundle config
      # references. This is `pnpm build:stub` for macos-aarch64; for
      # other targets we adapt the suffix inline below.
      - name: build pim-daemon-stub + place at externalBin path
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path pim-daemon-stub/Cargo.toml

          mkdir -p src-tauri/binaries

          case "${{ matrix.runner }}" in
            ubuntu-*)        triple="x86_64-unknown-linux-gnu"; ext="" ;;
            macos-15)        triple="aarch64-apple-darwin";     ext="" ;;
            macos-15-intel)  triple="x86_64-apple-darwin";      ext="" ;;
            windows-*)       triple="x86_64-pc-windows-msvc";   ext=".exe" ;;
          esac

          src="pim-daemon-stub/target/release/pim-daemon-stub${ext}"
          dst="src-tauri/binaries/pim-daemon-${triple}${ext}"
          cp "$src" "$dst"
          chmod 755 "$dst" || true
          echo "placed stub at $dst"

      # cargo build (no bundle) — validates compile + link + tauri.conf
      # references on every platform without producing 100MB installers.
      - name: cargo build src-tauri
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked
