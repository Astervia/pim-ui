name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  rust-quality:
    name: rust quality (fmt + clippy + audit)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install system deps (webkit2gtk for tauri build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit --file src-tauri/Cargo.lock

  tauri-cross-build:
    name: tauri build (${{ matrix.label }})
    needs: [frontend, rust-quality]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-22.04
            runner: ubuntu-22.04
          - label: macos-aarch64
            runner: macos-15
          - label: macos-x86_64
            runner: macos-15-intel
          - label: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.label }}

      - name: install ubuntu deps
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install --frozen-lockfile

      # `cargo build` on src-tauri validates compile + link + the
      # tauri.conf.json declarative wiring on every supported target.
      # The externalBin sidecar (real `pim-daemon` from the
      # proximity-internet-mesh repo) is only needed at bundle time;
      # for PR validation we skip the bundle stage to keep CI fast.
      # Release builds via desktop-release.yml are responsible for
      # fetching + bundling the real daemon binary.
      - name: cargo build src-tauri
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked
