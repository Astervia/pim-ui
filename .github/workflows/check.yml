name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  rust-quality:
    name: rust quality (fmt + clippy + audit)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install system deps (webkit2gtk for tauri build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # tauri.conf.json declares the pim-daemon sidecar via
      # bundle.externalBin, so the build script fails to resolve unless
      # the binary exists at src-tauri/binaries/. Fetch the matching
      # release once before any cargo step touches the manifest.
      - name: fetch pim-daemon sidecar
        run: bash scripts/fetch-daemon.sh

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit --file src-tauri/Cargo.lock

  tauri-cross-build:
    name: tauri build (${{ matrix.label }})
    needs: [frontend, rust-quality]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Windows is intentionally absent: per CLAUDE.md the daemon
      # bridge speaks JSON-RPC 2.0 over a Unix domain socket, which
      # tokio::net::unix only exposes on `cfg(unix)`. The Windows
      # port is out of scope for v1 and tracked separately. Adding
      # it here just to fail every push isn't useful.
      matrix:
        include:
          - label: ubuntu-22.04
            runner: ubuntu-22.04
          - label: macos-aarch64
            runner: macos-15
          - label: macos-x86_64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.label }}

      - name: install ubuntu deps
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: pnpm install --frozen-lockfile

      # tauri.conf.json's bundle.externalBin requires the sidecar to
      # exist on disk before `cargo build` touches the manifest.
      - name: fetch pim-daemon sidecar
        shell: bash
        run: bash scripts/fetch-daemon.sh

      # `cargo build` on src-tauri validates compile + link + the
      # tauri.conf.json declarative wiring on every supported target.
      # We skip the bundle stage here to keep PR validation fast;
      # desktop-release.yml does the full bundle on tag pushes.
      - name: cargo build src-tauri
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked
