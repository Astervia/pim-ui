name: Secret Detection

on: [push, pull_request]

permissions:
    contents: read

concurrency:
    group: secret-scanning-${{ github.ref }}
    cancel-in-progress: true

jobs:
    gitleaks:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v6
              with:
                  # Full history so gitleaks can scan the entire repo,
                  # not just the latest commit. On a long-lived branch,
                  # partial history would silently miss leaks introduced
                  # earlier.
                  fetch-depth: 0

            - name: Install Gitleaks
              run: |
                  set -euo pipefail
                  ver="8.18.4"
                  url="https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz"
                  curl -fsSL "$url" -o gitleaks.tgz
                  tar -xzf gitleaks.tgz
                  sudo mv gitleaks /usr/local/bin/
                  gitleaks version

            - name: Run Gitleaks
              run: gitleaks detect --source . --verbose --redact
